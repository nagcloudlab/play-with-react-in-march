<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>web ui</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body class="container">

    <div class="container">
        <h1 class="display-1">Web UI</h1>
        <hr />
        <p>Web UI is a user interface that is accessed through a web browser.
            It allows users to interact with a web
            application or website using graphical elements such as buttons, forms, and menus.</p>
    </div>
    <hr />


    <button class="btn btn-dark" id="top5-todos-btn">Top5 todos</button>
    <hr />
    <div id="progress-message"></div>
    <hr />
    <table class="table table-striped" id="todos-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Completed</th>
            </tr>
        </thead>
        <tbody id="todos-body"></tbody>
    </table>
    <hr />

    <div class="row">
        <div class="col-6">
            <div class="card">
                <div class="card-header">
                    Dynamic Web UI
                </div>
                <div class="card-body"></div>
                <div class="card-footer">
                    <button class="btn btn-primary" id="greet-btn">Greet Me</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./index.js"></script>

</body>

</html>
